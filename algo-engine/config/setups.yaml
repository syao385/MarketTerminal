# Aether Algorithmic Trading System - Setup Configurations

global_risk:
  max_portfolio_positions: 5
  max_sector_positions: 3
  daily_drawdown_limit_pct: 0.03
  monthly_drawdown_limit_pct: 0.10
  slippage_limit_pct: 0.0025
  spread_limit_pct: 0.005

setups:
  setup_1: # Gap and Go
    name: "Gap and Go"
    active: true
    min_gap_pct: 0.05
    min_premarket_volume: 100000
    rvol_threshold: 1.5
    stop_loss_type: "ORL" # Opening Range Low
    target_pct: null      # Calculated dynamically via GEX Call Wall
    ptp_1_r: 1.5          # 1.5R partial target
    ptp_1_sell_ratio: 0.5 # Sell 50% on PTP 1
    exit_trailing_ma: "daily_9_ema"

  setup_3: # Episodic Pivot
    name: "Episodic Pivot"
    active: true
    min_gap_pct: 0.08
    min_pm_adv_ratio: 0.05
    stop_loss_type: "LOD" # Low of Day
    target_atr_multiplier: 4.0
    ptp_1_r: 2.0
    ptp_1_sell_ratio: 0.4
    ptp_2_r: 4.0
    ptp_2_sell_ratio: 0.3
    exit_trailing_ma: "daily_9_ema"

  setup_12: # Standard ORB
    name: "Standard ORB"
    active: true
    orb_minutes: 15
    rvol_rm_threshold: 4.0
    stop_loss_type: "ORL_midpoint"
    target_std_dev: 2.0
    ptp_1_r: 1.5
    ptp_1_sell_ratio: 0.5
    exit_trailing_ma: "vwap"

  setup_13: # Blue Sky ATH
    name: "Blue Sky ATH"
    active: true
    min_consolidation_days: 30
    ath_buffer_pct: 0.05
    rvol_20d_multiplier: 1.5
    stop_loss_type: "daily_10_ema"
    target_pct: 0.25
    ptp_1_r: 2.0
    ptp_1_sell_ratio: 0.4
    ptp_2_r: 4.0
    ptp_2_sell_ratio: 0.3
    exit_trailing_ma: "daily_10_ema"

  setup_14: # Stage 1 to 2 Reversal
    name: "Stage 1 to 2 Reversal"
    active: true
    min_days_below_200sma: 60
    rvol_multiplier: 2.0
    stop_loss_pct: 0.02
    target_pct: 0.50
    ptp_1_r: 3.0
    ptp_1_sell_ratio: 0.3
    ptp_2_r: 6.0
    ptp_2_sell_ratio: 0.3
    exit_trailing_ma: "daily_50_sma"

  setup_15: # PEAD Consolidation Breakout
    name: "PEAD Consolidation Breakout"
    active: true
    max_days_post_ep: 40
    rvol_multiplier: 1.5
    stop_loss_type: "consolidation_support"
    target_pct: 0.20
    ptp_1_r: 2.0
    ptp_1_sell_ratio: 0.5
    exit_trailing_ma: "daily_21_ema"
